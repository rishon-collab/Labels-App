<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Niimbot Hello World</title>
  <!-- Pin to an exact alpha version — API can change anytime -->
  <script src="https://unpkg.com/@mmote/niimbluelib@0.0.1-alpha.38/dist/umd/niimbluelib.min.js"></script>
</head>
<body>
  <h2>Niimbot Hello World 🖨️</h2>
  <button id="btnPrint">Connect & Print</button>
  <pre id="log"></pre>

  <script>
    const log = (msg) => {
      document.getElementById("log").textContent += msg + "\n";
      console.log(msg);
    };

    document.getElementById("btnPrint").addEventListener("click", async () => {
      // 1. Create a Bluetooth client
      const client = new niimbluelib.NiimbotBluetoothClient();

      // Optional: listen to events
      client.on("connect", () => log("✅ Connected!"));
      client.on("disconnect", () => log("🔌 Disconnected"));
      client.on("printprogress", ({ current, total }) =>
        log(`📄 Printing line ${current}/${total}`)
      );

      try {
        // 2. Connect — this opens the browser's BT device picker
        log("Opening Bluetooth picker...");
        await client.connect();

        // 3. Draw your label on a canvas
        //    Adjust width/height to match your label size in pixels.
        //    D110: 96px wide. B1/B21: 384px wide. Height = label length in px.
        const W = 384, H = 96;
        const canvas = document.createElement("canvas");
        canvas.width = W;
        canvas.height = H;
        const ctx = canvas.getContext("2d");

        // White background
        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, W, H);

        // Draw "Hello, World!" text
        ctx.fillStyle = "black";
        ctx.font = "bold 48px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("Hello, World!", W / 2, H / 2);

        // 4. Print the canvas as a label
        //    printTask: "D110" | "B1" | "B21" etc — match your printer model
        //    labelType: 1 = regular label
        //    density: 3 (1-5, higher = darker)
        //    quantity: number of copies
        const imageData = ctx.getImageData(0, 0, W, H);

        await client.abstraction.printImage(imageData, {
          printTask: "B1",   // ← change to your printer's task name
          labelType: 1,
          density: 3,
          quantity: 1,
        });

        log("🎉 Print job sent!");
      } catch (err) {
        log("❌ Error: " + err.message);
        console.error(err);
      } finally {
        await client.disconnect();
      }
    });
  </script>
</body>
</html>
