<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Niimbot Hello World</title>
  <script src="https://unpkg.com/@mmote/niimbluelib@0.0.1-alpha.39/dist/umd/niimbluelib.min.js"></script>
</head>
<body>
  <h2>Niimbot Hello World 🖨️</h2>
  <button id="btnPrint">Connect & Print</button>
  <pre id="log"></pre>

  <script>
    const log = (msg) => {
      document.getElementById("log").textContent += msg + "\n";
      console.log(msg);
    };

    document.getElementById("btnPrint").addEventListener("click", async () => {
      const client = new niimbluelib.NiimbotBluetoothClient();

      client.on("connect",    ()  => log("✅ Connected!"));
      client.on("disconnect", ()  => log("🔌 Disconnected"));
      client.on("printprogress", (e) =>
        log(`📄 Page ${e.page}, print: ${e.pagePrintProgress}%, feed: ${e.pageFeedProgress}%`)
      );

      try {
        log("Opening Bluetooth picker...");
        await client.connect();

        // --- Draw the label on a canvas ---
        // B1: 384px wide, printDirection = "top"
        // D110: 96px wide, printDirection = "left"
        const W = 384, H = 96;
        const canvas = document.createElement("canvas");
        canvas.width = W;
        canvas.height = H;
        const ctx = canvas.getContext("2d");

        ctx.fillStyle = "white";
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = "black";
        ctx.font = "bold 60px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("Hello, World!", W / 2, H / 2);

        // --- Encode using the library's ImageEncoder (required!) ---
        // printDirection: "top" for B1/B21, "left" for D110
        const encoded = niimbluelib.ImageEncoder.encodeCanvas(canvas, "top");

        // --- Create print task via abstraction.newPrintTask ---
        client.stopHeartbeat();

        const task = client.abstraction.newPrintTask("B1", {
          totalPages: 1,
          density: 3,       // 1–5
          labelType: niimbluelib.LabelType.WithGaps,
          statusPollIntervalMs: 100,
          statusTimeoutMs: 8000,
        });

        await task.printInit();
        await task.printPage(encoded, 1);  // encoded image, quantity

        log("⏳ Waiting for printer to finish...");
        await task.waitForFinished();

        log("🎉 Done!");
      } catch (err) {
        log("❌ Error: " + err.message);
        console.error(err);
      } finally {
        await client.abstraction.printEnd().catch(() => {});
        client.startHeartbeat();
        await client.disconnect();
      }
    });
  </script>
</body>
</html>
