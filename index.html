<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Niimbot Web Print</title>
    <script src="https://unpkg.com/@mmote/niimbluelib@latest/dist/umd/niimbluelib.min.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; 
            padding: 40px 20px;
            background-color: #f4f7f6;
        }
        .card {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        button { 
            padding: 15px 30px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 8px;
            transition: background 0.2s;
        }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #status { margin-top: 25px; font-weight: 500; color: #666; }
        .success { color: #28a745 !important; }
        .error { color: #dc3545 !important; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Label Printer</h1>
        <p>Connect your Niimbot via Bluetooth</p>
        
        <button id="printBtn">Pair & Print Test</button>
        
        <div id="status">Ready to connect</div>
    </div>

    <script>
        const printBtn = document.getElementById('printBtn');
        const statusDiv = document.getElementById('status');

        printBtn.addEventListener('click', async () => {
            let connector = null;

            try {
                statusDiv.innerText = "Searching for devices...";
                statusDiv.className = "";
                printBtn.disabled = true;

                // 1. Get the correct Library Namespace
                // Some versions nest the exports under window.niimbluelib.niimbluelib
                const lib = window.niimbluelib.NiimbotBluetoothConnector 
                            ? window.niimbluelib 
                            : window.niimbluelib.niimbluelib;

                if (!lib || !lib.NiimbotBluetoothConnector) {
                    throw new Error("Niimbot library failed to initialize.");
                }

                // 2. Connect
                connector = new lib.NiimbotBluetoothConnector();
                const client = await connector.connect();
                
                statusDiv.innerText = "Connected! Sending data...";

                // 3. Create Canvas Label (240x96 is standard for D11/D110)
                const canvas = document.createElement('canvas');
                canvas.width = 240;
                canvas.height = 96;
                const ctx = canvas.getContext('2d');

                // Draw background white
                ctx.fillStyle = "white";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                // Draw text black
                ctx.fillStyle = "black";
                ctx.font = "bold 28px Arial";
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText("NIIM BLUE", 120, 48);

                // 4. Execute Print
                // Abstraction.print handles the handshake, packets, and ending
                await client.abstraction.print({
                    image: canvas,
                    quantity: 1,
                    density: 3, // 1-5 (3 is medium)
                    labelType: 1
                });

                statusDiv.innerText = "Print Successful!";
                statusDiv.className = "success";

            } catch (error) {
                console.error("Print Error:", error);
                statusDiv.innerText = "Error: " + error.message;
                statusDiv.className = "error";
            } finally {
                printBtn.disabled = false;
                // Disconnect after 3 seconds to free up the printer
                if (connector) {
                    setTimeout(() => connector.disconnect(), 3000);
                }
            }
        });
    </script>
</body>
</html>
